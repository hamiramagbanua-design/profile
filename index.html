<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f1f3;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container{
      width:350px;
      position:relative;
    }

    .top-bg{
      height:180px;
      background:#7a001f;
      border-radius:20px 20px 0 0;
    }

    .card{
      background:#fff;
      margin-top:-70px;
      border-radius:25px;
      padding:90px 25px 30px;
      text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
      position:relative;
    }

    .profile-img{
      width:140px;
      height:140px;
      border-radius:50%;
      border:8px solid #fff;
      object-fit:cover;
      position:absolute;
      top:-70px;
      left:50%;
      transform:translateX(-50%);
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
    }

    h1{
      color:#7a001f;
      font-size:42px;
      margin-bottom:5px;
    }

    .member{
      color:#777;
      font-size:20px;
      letter-spacing:2px;
      margin-bottom:35px;
    }

    .info-box{
      border:2px solid #f3dfe4;
      border-left:8px solid #7a001f;
      border-radius:20px;
      padding:25px 20px;
      text-align:left;
      margin-bottom:35px;
    }

    .info-title{
      color:#7a001f;
      font-size:18px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .info-content{
      display:flex;
      justify-content:space-between;
      gap:20px;
    }

    .label{
      color:#666;
      font-size:14px;
      margin-bottom:8px;
      font-weight:bold;
    }

    .value{
      font-size:16px;
      color:#111;
      line-height:1.5;
    }

    .btn{
      width:100%;
      padding:15px;
      border:3px solid #7a001f;
      border-radius:18px;
      background:#fff;
      color:#7a001f;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#7a001f;
      color:#fff;
    }
  </style>

</head>

<body>

  <div class="container">

    <div class="top-bg"></div>

    <div class="card">

      <!-- IMPORTANT: replace image.jpg with your real file -->
      <img src="photo.jpg" alt="Profile Picture" class="profile-img"
           onerror="this.src='https://via.placeholder.com/140'">

      <h1>Usman</h1>
      <div class="member">MEMBER</div>

      <div class="info-box">

        <div class="info-title">ACCOUNT INFORMATION</div>

        <div class="info-content">

          <div>
            <div class="label">USERNAME</div>
            <div class="value">Usman</div>
          </div>

          <div>
            <div class="label">ADDRESS</div>
            <div class="value">
              Nonoyan, Baliguian,<br>
              ZDN
            </div>
          </div>

        </div>

      </div>

      <!-- FIXED SIGN OUT -->
      <button class="btn" onclick="logout()">Sign Out</button>

    </div>

  </div>

  <script>
    function logout() {
      alert("Signed out successfully!");
      window.location.href = "index.html"; // change if your login page name is different
    }
  </script>

</body>
</html>
